<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ה-AI של אדם - גרסת GitHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
        }
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f8fafc;
        }
        .chat-container {
            height: calc(100vh - 160px);
        }
        .message-bubble {
            max-width: 85%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-msg {
            background-color: var(--primary);
            color: white;
            border-radius: 1.5rem 1.5rem 0.2rem 1.5rem;
            align-self: flex-start;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }
        .ai-msg {
            background-color: white;
            color: #1e293b;
            border-radius: 1.5rem 1.5rem 1.5rem 0.2rem;
            align-self: flex-end;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .ai-msg pre {
            background: #1e293b;
            color: #f8fafc;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            direction: ltr;
            margin: 0.75rem 0;
        }
        .ai-msg code {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 600;
        }
        .loading-dot {
            animation: dot-blink 1.4s infinite linear;
        }
        @keyframes dot-blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-slate-50">

    <!-- Header -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">
                א
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800">העוזר של אדם</h1>
                <p class="text-xs text-slate-500 flex items-center gap-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full"></span> מחובר ל-Gemini 1.5 Flash
                </p>
            </div>
        </div>
        <button id="clearChat" class="p-2 text-slate-400 hover:text-red-500 transition-colors" title="נקה צ'אט">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </button>
    </nav>

    <!-- Chat Messages -->
    <main id="chatWindow" class="flex-grow container mx-auto max-w-4xl p-4 overflow-y-auto chat-container flex flex-col gap-6">
        <div class="ai-msg message-bubble p-5">
            שלום אדם! אני מוכן לעזור לך כאן בגיטהאב. איך אני יכול לסייע היום?
        </div>
    </main>

    <!-- Input Area -->
    <footer class="bg-white border-t border-slate-200 p-4 pb-6 sticky bottom-0">
        <div class="container mx-auto max-w-4xl">
            <div class="relative flex items-center gap-3">
                <input type="text" id="userInput" 
                    class="w-full p-4 pr-14 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-right"
                    placeholder="כתוב הודעה כאן..." autocomplete="off">
                <button id="sendBtn" 
                    class="absolute left-2 bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl transition-all active:scale-95 disabled:opacity-50 shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </div>
            <p class="text-center text-[10px] text-slate-400 mt-2">מופעל על ידי Google Gemini API</p>
        </div>
    </footer>

    <script>
        // המפתח שלך מוטמע כאן. וודא שב-Google AI Studio המפתח מוגדר כ-Unrestricted
        const API_KEY = "AIzaSyC08AXOJ8WAxp6c5A6z45NBTt_n8Y-D30I";
        const MODEL = "gemini-1.5-flash"; 
        
        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearChat');

        let chatHistory = [];

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // הצגת הודעת משתמש
            appendMessage(message, 'user');
            userInput.value = '';
            setLoading(true);

            try {
                // קריאה ל-API בגרסה יציבה
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [
                            ...chatHistory,
                            { role: "user", parts: [{ text: message }] }
                        ],
                        systemInstruction: {
                            parts: [{ text: "אתה ה-AI האישי של אדם. ענה לו תמיד בעברית, הייה עוזר וחכם." }]
                        }
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || "שגיאת תקשורת");
                }

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;

                // שמירה להיסטוריה
                chatHistory.push({ role: "user", parts: [{ text: message }] });
                chatHistory.push({ role: "model", parts: [{ text: aiText }] });

                appendMessage(aiText, 'ai');
            } catch (error) {
                console.error(error);
                appendMessage(`מצטער אדם, קרתה שגיאה: ${error.message}`, 'ai');
            } finally {
                setLoading(false);
            }
        }

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `${sender}-msg message-bubble p-5 shadow-sm`;
            
            if (sender === 'ai') {
                msgDiv.innerHTML = marked.parse(text);
            } else {
                msgDiv.innerText = text;
            }
            
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            if (isLoading) {
                const loader = document.createElement('div');
                loader.id = 'ai-loader';
                loader.className = 'ai-msg message-bubble p-4 italic text-slate-400 flex gap-1';
                loader.innerHTML = 'חושב<span class="loading-dot">.</span><span class="loading-dot" style="animation-delay:0.2s">.</span><span class="loading-dot" style="animation-delay:0.4s">.</span>';
                chatWindow.appendChild(loader);
            } else {
                const loader = document.getElementById('ai-loader');
                if (loader) loader.remove();
            }
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        clearBtn.addEventListener('click', () => {
            chatWindow.innerHTML = '';
            chatHistory = [];
            appendMessage("השיחה נוקתה. איך אני יכול לעזור?", 'ai');
        });
    </script>
</body>
</html>
