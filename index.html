<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Flash Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #0f172a; color: white; height: 100vh; display: flex; flex-direction: column; margin: 0; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; }
        .user { align-self: flex-start; background: #334155; }
        .ai { align-self: flex-end; background: #2563eb; }
        .error { background: #991b1b; color: white; align-self: center; }
        input { background: #1e293b; border: 1px solid #334155; color: white; outline: none; }
        .loading { display: none; color: #94a3b8; text-align: center; padding: 10px; }
    </style>
</head>
<body>

<header class="p-4 border-b border-slate-800 bg-slate-900 flex justify-between items-center">
    <h1 class="font-bold text-xl">בדיקת API ישירה</h1>
    <span class="text-xs text-slate-400">Model: gemini-flash-latest</span>
</header>

<div id="chat-box" class="chat-box">
    <div class="msg ai">מוכן לבדיקה. שלח הודעה כדי לנסות את פקודת ה-CURL בתוך הקוד.</div>
</div>

<div id="loading" class="loading">מתקשר עם גוגל...</div>

<footer class="p-4 bg-slate-900 border-t border-slate-800">
    <div class="max-w-4xl mx-auto flex gap-2">
        <input type="text" id="user-input" class="flex-1 p-3 rounded-xl" placeholder="כתוב משהו...">
        <button id="send-btn" class="bg-blue-600 px-6 py-3 rounded-xl font-bold">שלח</button>
    </div>
</footer>

<script>
    // המפתח מהפקודה שלך
    const API_KEY = "AIzaSyCheAwVmxCX1CHTtxBGzG3Fd5gEI4YJgs8";
    // הנתיב המדויק מה-CURL
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${API_KEY}`;

    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const loading = document.getElementById('loading');

    async function startTest(prompt) {
        try {
            console.log("Sending request to:", URL);
            
            const response = await fetch(URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            console.log("Response data:", data);

            if (!response.ok) {
                throw new Error(data.error?.message || "שגיאת תקשורת");
            }

            const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!text) throw new Error("המבנה חזר תקין אבל ללא טקסט.");

            return text;

        } catch (err) {
            console.error("Full Error Info:", err);
            throw err;
        }
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        loading.style.display = 'block';
        sendBtn.disabled = true;

        try {
            const aiText = await startTest(text);
            appendMessage(aiText, 'ai');
        } catch (err) {
            appendMessage("שגיאה: " + err.message, 'error');
        } finally {
            loading.style.display = 'none';
            sendBtn.disabled = false;
        }
    }

    function appendMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        // שימוש ב-marked רק אם זה AI והטקסט קיים
        if (type === 'ai' && window.marked && text) {
            div.innerHTML = marked.parse(text);
        } else {
            div.textContent = text;
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
</script>

</body>
</html>
